baseURL: "https://blog.overgard.dk/"
title: "& Blog"
# paginate: 5 # deprecated
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# googleAnalytics: UA-123-45

# minify:
#  disableXML: true
#  minifyOutput: true

params:
  # env: development # Let PaperMod handle it.
  title: "& Blog"
  description: "A blog about Microsoft infrastructure, identity management and automation."
  keywords: [Blog, Microsoft, Entra, "Active Directory", Automation, PowerShell]
  author: "Kåre Overgård"
  images: ["/favicon.ico"] 
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: /favicon.ico
    favicon16x16: /assets/favicon16.png
    favicon32x32: /assets/favicon32.png

  label:
    text: "Blog"
    icon: /assets/favicon32.png
    iconHeight: 32

